name: Build roboto-deploy Debian Package

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y debhelper dh-make

    - name: Build Debian package
      run: |
        dpkg-buildpackage -us -uc -b
        mv ../*.deb .

        VERSION=$(dpkg-parsechangelog -S Version | cut -d'-' -f1 || echo "unknown")
        echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Upload Debian package
      uses: actions/upload-artifact@v4
      with:
        name: roboto-deploy-v${{ env.PKG_VERSION }}-all
        path: "*.deb"

    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: "*.deb"
